<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background: #0f0f12; color: white; }
        .flex-center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #18181c; padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #2d2d34; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        input { padding: 12px; font-size: 16px; border: 1px solid #3a3a44; border-radius: 6px; margin-bottom: 15px; width: 220px; text-align: center; background: #222227; color: white; }
        button { padding: 12px 24px; font-size: 16px; background: #ff4a4a; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #webContainer { width: 100%; height: 100vh; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="lockScreen" class="flex-center">
        <div class="login-card">
            <h2>Access Gate</h2>
            <p style="color: #8e8e93; font-size: 14px; margin-bottom: 20px;">Enter key to enter the main page.</p>
            <input type="password" id="accessKey" placeholder="Enter Password"><br>
            <button onclick="unlock()">Enter Site</button>
        </div>
    </div>

    <div id="webContainer">
        <iframe 
            src="https://ffemote.pro/" 
            sandbox="allow-same-origin allow-forms allow-scripts">
        </iframe>
    </div>

    <script>
        function unlock() {
            const code = document.getElementById('accessKey').value;
            if (code === "1") {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('webContainer').style.display = 'block';
            } else {
                alert("Wrong Key!");
            }
        }
    </script>
</body>
</html>
