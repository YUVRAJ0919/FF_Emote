<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Document Portal</title>
    <style>
        /* Make sure the document fills the entire page smoothly */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* The Key/Password Screen styling */
        .gatekeeper-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #1a1a1a; color: white; }
        .login-box { background: #2a2a2a; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input { padding: 10px; font-size: 16px; border: none; border-radius: 4px; margin-bottom: 15px; width: 200px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        
        /* Hidden content viewer */
        #contentViewer { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <div id="lockScreen" class="gatekeeper-container">
        <div class="login-box">
            <h2>Authentication Required</h2>
            <p>Please enter your access key to view the paper.</p>
            <input type="password" id="accessKey" placeholder="Enter Key Here"><br>
            <button onclick="verifyKey()">Access Document</button>
        </div>
    </div>

    <object id="contentViewer" type="text/html" data=""></object>

    <script>
        function verifyKey() {
            const enteredKey = document.getElementById('accessKey').value;
            
            // CONFIGURATION: Set your key and secret website target here
            const correctKey = "your_secret_key_here"; 
            const secretWebsiteUrl = "https://ffemote.pro"; 

            if (enteredKey === correctKey) {
                // Hide the password box
                document.getElementById('lockScreen').style.display = 'none';
                
                // Inject the secret website into the <object> tag and show it
                const viewer = document.getElementById('contentViewer');
                viewer.data = secretWebsiteUrl;
                viewer.style.display = 'block';
            } else {
                alert("Incorrect Key! Access Denied.");
            }
        }
    </script>
</body>
</html>
