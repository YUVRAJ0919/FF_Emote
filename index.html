<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Portal</title>
    <style>
        /* Ensures everything scales perfectly to fill the screen */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background: #1a1a1a; color: white; }
        
        /* Centered Key/Password Screen Box */
        .gatekeeper-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #2a2a2a; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input { padding: 10px; font-size: 16px; border: none; border-radius: 4px; margin-bottom: 15px; width: 200px; text-align: center; background: #333; color: white; }
        button { padding: 10px 20px; font-size: 16px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        
        /* Container for the hidden page */
        #contentContainer { width: 100%; height: 100vh; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="lockScreen" class="gatekeeper-container">
        <div class="login-box">
            <h2>Authentication Required</h2>
            <p>Please enter your access key to view the page.</p>
            <input type="password" id="accessKey" placeholder="Enter Key Here"><br>
            <button onclick="verifyKey()">Access Content</button>
        </div>
    </div>

    <div id="contentContainer"></div>

    <script>
        function verifyKey() {
            const enteredKey = document.getElementById('accessKey').value;
            
            // 🛑 SETUP: Change your password key and target URL link here
            const correctKey = "1"; 
            const targetUrl = "https://ffemote.pro"; 

            if (enteredKey === correctKey) {
                // Hide the password box screen
                document.getElementById('lockScreen').style.display = 'none';
                
                // Target the output container
                const container = document.getElementById('contentContainer');
                container.style.display = 'block';
                
                /* The Sandbox Trick: 
                  By using 'allow-same-origin allow-forms' but OMITTING 'allow-scripts', 
                  the target website's text and style will load, but its pop-up code 
                  (#likesBoostPopup) will be completely frozen and won't appear.
                */
                container.innerHTML = `
                    <iframe 
                        src="${targetUrl}" 
                        sandbox="allow-same-origin allow-forms" 
                        style="width:100%; height:100%; border:none;">
                    </iframe>`;
            } else {
                alert("Incorrect Key! Access Denied.");
            }
        }
    </script>
</body>
</html>
