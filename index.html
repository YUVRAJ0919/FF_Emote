<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: #1a1a1a; color: white; }
        .gatekeeper-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #2a2a2a; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input { padding: 10px; font-size: 16px; border: none; border-radius: 4px; margin-bottom: 15px; width: 200px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        #loadingText { display: none; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="lockScreen" class="gatekeeper-container">
        <div class="login-box">
            <h2>Authentication Required</h2>
            <p>Please enter your access key to view the page.</p>
            <input type="password" id="accessKey" placeholder="Enter Key Here"><br>
            <button onclick="verifyKey()">Access Content</button>
            <div id="loadingText">Cleaning and loading page... please wait.</div>
        </div>
    </div>

    <div id="contentContainer"></div>

    <script>
        function verifyKey() {
            const enteredKey = document.getElementById('accessKey').value;
            
            // 🛑 CONFIGURATION: Change your secret key and target URL here
            const correctKey = "1"; 
            const targetUrl = "https://ffemote.pro"; 

            if (enteredKey === correctKey) {
                // Show loading status
                document.getElementById('loadingText').style.display = 'block';
                
                // Using a public CORS proxy to fetch the third-party website's raw code
                const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);

                fetch(proxyUrl)
                    .then(response => {
                        if (response.ok) return response.json();
                        throw new Error('Network error.');
                    })
                    .then(data => {
                        // Parse the raw HTML text into a virtual document structure
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(data.contents, 'text/html');

                        // 1. Target and delete the specific Pop-up ID you provided
                        const popUp = doc.getElementById('likesBoostPopup');
                        if (popUp) {
                            popUp.remove();
                            console.log("Success: Pop-up removed!");
                        }

                        // 2. Target and delete any embedded YouTube videos
                        const youtubeVideos = doc.querySelectorAll('iframe[src*="youtube.com"], embed[src*="youtube.com"]');
                        youtubeVideos.forEach(video => {
                            video.remove();
                        });

                        // Hide the lock screen entirely
                        document.getElementById('lockScreen').style.display = 'none';
                        
                        // Inject the completely cleaned HTML into your page container
                        document.getElementById('contentContainer').innerHTML = doc.documentElement.innerHTML;
                    })
                    .catch(err => {
                        alert("Error loading the page safely. The website might be blocking requests.");
                        document.getElementById('loadingText').style.display = 'none';
                        console.error(err);
                    });

            } else {
                alert("Incorrect Key! Access Denied.");
            }
        }
    </script>
</body>
</html>
